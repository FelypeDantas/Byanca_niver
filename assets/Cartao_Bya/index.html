<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de visitas</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="../favicon/favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#f2dae7'
                    },
                    fontFamily: {
                        titulo: ['Vast Shadow', 'cursive']
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-gray-100 via-gray-200 to-gray-300 min-h-screen flex items-center justify-center">

    <div class="flex flex-col sm:flex-row items-center gap-6 p-8 rounded-2xl 
                bg-white/30 backdrop-blur-lg shadow-2xl 
                hover:scale-[1.02] transition-all duration-300">

        <!-- Imagem -->
        <div class="relative group">
            <img class="w-40 h-40 sm:w-48 sm:h-48 rounded-full object-cover 
                        border-4 border-white shadow-lg 
                        group-hover:scale-105 transition duration-300" src="./Bya.jpg" alt="Foto Bya">

            <!-- Glow -->
            <div class="absolute inset-0 rounded-full bg-pink-300 blur-xl opacity-30 
                        group-hover:opacity-50 transition"></div>
        </div>

        <!-- Info -->
        <div class="text-center sm:text-left">
            <h1 class="text-4xl sm:text-5xl font-black text-primary font-titulo">
                Byanca Matos
            </h1>

            <p class="text-xl sm:text-2xl text-gray-700 mt-2">
                Analista de Dados
            </p>

            <!-- Linha decorativa -->
            <div class="w-20 h-1 bg-pink-400 my-4 mx-auto sm:mx-0 rounded-full"></div>

            <!-- Redes -->
            <div class="flex justify-center sm:justify-start gap-5 mt-4">

                <a href="https://www.linkedin.com/in/byanca-matos-29204b1bb/" target="_blank"
                    class="text-gray-600 hover:text-blue-500 transform hover:scale-125 hover:-translate-y-1 transition duration-300">
                    <i class="fab fa-linkedin fa-2x"></i>
                </a>

                <a href="https://github.com/ByancaMatos01" target="_blank"
                    class="text-gray-600 hover:text-black transform hover:scale-125 hover:-translate-y-1 transition duration-300">
                    <i class="fab fa-github fa-2x"></i>
                </a>

            </div>
        </div>

    </div>

</body>

</html>
